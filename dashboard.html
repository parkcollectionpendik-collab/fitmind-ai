<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMind AI – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#f5f2eb;--lime:#c8f542;--lime2:#a8d92e;--gray:#111;--muted:#888;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#0d0d0d;border-right:1px solid #ffffff0f;padding:1.5rem;display:flex;flex-direction:column;z-index:10}
.logo{font-family:var(--font-head);font-weight:800;font-size:1.1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid #ffffff0f;text-decoration:none;color:inherit;display:block}
.logo span{color:var(--lime)}
.nav{display:flex;flex-direction:column;gap:0.3rem;flex:1}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;border-radius:12px;cursor:pointer;transition:all 0.2s;font-size:0.9rem;color:var(--muted);border:none;background:transparent;width:100%;text-align:left;font-family:var(--font-body);text-decoration:none}
.nav-item:hover{background:#ffffff08;color:var(--white)}
.nav-item.active{background:#c8f54215;color:var(--lime)}
.nav-item .icon{width:20px;text-align:center;font-size:1rem}
.sidebar-bottom{padding-top:1rem;border-top:1px solid #ffffff0f}
.user-info{display:flex;align-items:center;gap:0.75rem;padding:0.5rem}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--lime),#4af);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:0.85rem;color:var(--black);flex-shrink:0}
.user-name{font-size:0.85rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.signout-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0.25rem}
.signout-btn:hover{color:#ff6b6b}
.main{margin-left:240px;padding:2rem;min-height:100vh}
.pro-badge{display:inline-flex;align-items:center;background:linear-gradient(135deg,#c8f542,#a8d92e);color:var(--black);padding:0.2rem 0.7rem;border-radius:100px;font-size:0.7rem;font-family:var(--font-head);font-weight:800}
.free-badge{display:inline-flex;align-items:center;background:#ffffff15;color:var(--muted);padding:0.2rem 0.7rem;border-radius:100px;font-size:0.7rem;font-family:var(--font-head);font-weight:800}
.badge-live{display:inline-flex;align-items:center;gap:0.4rem;background:#c8f54215;border:1px solid #c8f54230;color:var(--lime);padding:0.3rem 0.8rem;border-radius:100px;font-size:0.75rem;font-family:var(--font-head);font-weight:700}
.badge-dot{width:6px;height:6px;background:var(--lime);border-radius:50%;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tab-section{display:none}
.tab-section.active{display:block}
.spin{display:inline-block;width:22px;height:22px;border:2px solid #ffffff15;border-top-color:var(--lime);border-radius:50%;animation:spin-anim 0.8s linear infinite}
@keyframes spin-anim{to{transform:rotate(360deg)}}
/* AI KOC */
.ai-coach-full{display:flex;flex-direction:column;height:calc(100vh - 160px);background:var(--gray);border:1px solid #ffffff0f;border-radius:20px;padding:1.5rem}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1rem;padding-right:0.25rem}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:10px}
.msg{max-width:85%;padding:0.75rem 1rem;border-radius:16px;font-size:0.9rem;line-height:1.6}
.msg.ai{background:#ffffff0a;border:1px solid #ffffff0f;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:var(--lime);color:var(--black);align-self:flex-end;border-bottom-right-radius:4px}
.msg.typing{background:#ffffff0a;border:1px solid #ffffff0f;align-self:flex-start}
.msg.limit{background:#1a0a0a;border:1px solid #ff6b6b30;align-self:stretch;text-align:center;max-width:100%}
.typing-dots{display:flex;gap:4px;align-items:center;padding:0.2rem 0}
.typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-wrap{display:flex;gap:0.5rem}
.chat-input{flex:1;background:#ffffff08;border:1px solid #ffffff15;border-radius:100px;padding:0.7rem 1rem;color:var(--white);font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.2s}
.chat-input::placeholder{color:#ffffff40}
.chat-input:focus{border-color:#c8f54240}
.send-btn{background:var(--lime);color:var(--black);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:1rem;transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:hover{background:var(--lime2)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.plan-card{background:linear-gradient(135deg,#0f1a06,#0d0d0d);border:1px solid #c8f54230;border-radius:16px;padding:1.4rem;width:100%;max-width:100%}
.plan-section{background:#ffffff08;border-radius:12px;padding:1rem;margin-bottom:0.75rem;border-left:3px solid}
/* ANA SAYFA */
.home-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.home-greeting{font-family:var(--font-head);font-size:1.5rem;font-weight:800}
.home-greeting b{color:var(--lime)}
.home-date{font-size:0.82rem;color:var(--muted);margin-top:0.25rem}
/* HERO */
.today-hero{background:linear-gradient(135deg,#0d1f04,#0a0a0a);border:1px solid #c8f54230;border-radius:24px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;top:-100px;right:-100px;width:350px;height:350px;background:var(--lime);opacity:0.04;border-radius:50%;pointer-events:none}
.hero-day-label{font-size:0.7rem;color:var(--lime);font-family:var(--font-head);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem}
.hero-focus{font-family:var(--font-head);font-size:1.9rem;font-weight:800;line-height:1.1;margin-bottom:0.6rem}
.hero-focus b{color:var(--lime)}
.hero-chips{display:flex;gap:0.75rem;margin-bottom:1.75rem;flex-wrap:wrap}
.chip{background:#ffffff08;border:1px solid #ffffff10;border-radius:100px;padding:0.35rem 0.9rem;font-size:0.8rem;color:var(--white);display:flex;align-items:center;gap:0.35rem}
.chip .dim{color:var(--muted);font-size:0.72rem}
.hero-btns{display:flex;gap:0.75rem;flex-wrap:wrap}
.btn-go{background:linear-gradient(135deg,var(--lime),var(--lime2));color:#000;border:none;border-radius:14px;padding:0.9rem 2rem;font-family:var(--font-head);font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:0.5rem;box-shadow:0 4px 20px #c8f54228;text-decoration:none}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 32px #c8f54235}
.btn-out{background:#ffffff08;color:var(--white);border:1px solid #ffffff15;border-radius:14px;padding:0.9rem 1.4rem;font-family:var(--font-head);font-weight:700;font-size:0.88rem;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
.btn-out:hover{background:#ffffff12;border-color:#ffffff25}
/* GOREVLER */
.sec-label{font-family:var(--font-head);font-size:0.68rem;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.75rem}
.task-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem}
.task{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--gray);border:1.5px solid #ffffff0a;border-radius:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.task:hover{border-color:#ffffff18;background:#161616}
.task.done{border-color:#4ade8025;background:#071507}
.task.done::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4ade80;border-radius:3px 0 0 3px}
.task-box{width:26px;height:26px;border-radius:8px;border:2px solid #ffffff20;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;transition:all 0.25s}
.task.done .task-box{background:#4ade80;border-color:#4ade80;color:#000}
.task-info{flex:1;min-width:0}
.task-title{font-size:0.9rem;font-weight:500;margin-bottom:0.15rem}
.task.done .task-title{text-decoration:line-through;opacity:0.4}
.task-desc{font-size:0.73rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-tag{font-size:0.68rem;font-family:var(--font-head);font-weight:700;padding:0.22rem 0.65rem;border-radius:100px;flex-shrink:0;white-space:nowrap}
.tag-g{background:#c8f54215;color:var(--lime)}
.tag-b{background:#44aaff15;color:#44aaff}
/* 2 KOLON */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.card{background:var(--gray);border:1px solid #ffffff0f;border-radius:20px;padding:1.5rem}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-title{font-family:var(--font-head);font-size:0.9rem;font-weight:700}
.card-link{font-size:0.75rem;color:var(--lime);text-decoration:none;font-family:var(--font-head);font-weight:700;opacity:0.7}
.card-link:hover{opacity:1}
/* TAKIP */
.track-pair{display:flex;gap:0.75rem;margin-bottom:0.75rem}
.tbox{flex:1;background:#ffffff05;border:1.5px solid #ffffff08;border-radius:14px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.2s}
.tbox:hover{background:#ffffff09;border-color:#ffffff18}
.tbox-num{font-family:var(--font-head);font-size:1.4rem;font-weight:800;line-height:1;margin:0.2rem 0}
.tbox-lbl{font-size:0.65rem;color:var(--muted)}
.tbar{height:3px;background:#ffffff0f;border-radius:100px;margin-top:0.55rem;overflow:hidden}
.tfill{height:100%;border-radius:100px;transition:width 0.4s}
.add-row{display:flex;gap:0.4rem}
.add-btn{flex:1;padding:0.5rem;border-radius:10px;font-family:var(--font-head);font-weight:700;font-size:0.72rem;cursor:pointer;transition:background 0.2s}
/* HAFTA BAR */
.wk-bars{display:flex;gap:0.3rem;align-items:flex-end;height:48px;margin-bottom:0.45rem}
.wk-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.2rem}
.wk-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height 0.5s}
.wk-lbl{font-size:0.56rem;font-family:var(--font-head);font-weight:700}
/* BESLENME */
.meal-list{display:flex;flex-direction:column;gap:0.45rem}
.meal-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;background:#ffffff04;border-radius:12px}
.meal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:0.82rem;font-weight:500}
.meal-foods{font-size:0.7rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:0.06rem}
.meal-kcal{font-family:var(--font-head);font-size:0.75rem;font-weight:700;color:var(--muted);flex-shrink:0}
/* UPGRADE */
.upgrade-strip{background:linear-gradient(135deg,#0e1d04,#0a0a0a);border:1px solid #c8f54222;border-radius:20px;padding:1.5rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.upgrade-txt{flex:1;min-width:180px}
.upgrade-txt h3{font-family:var(--font-head);font-size:0.95rem;font-weight:700;margin-bottom:0.3rem}
.upgrade-txt p{font-size:0.8rem;color:var(--muted);line-height:1.5}
.upgrade-btn{background:var(--lime);color:#000;border:none;border-radius:100px;padding:0.7rem 1.5rem;font-family:var(--font-head);font-weight:700;font-size:0.85rem;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.2s}
.upgrade-btn:hover{background:var(--lime2)}
/* PLAN YOK */
.no-plan{max-width:600px;margin:0 auto;padding:1rem 0}
.nph{background:linear-gradient(135deg,#0d1f04,#0a0a0a);border:1px solid #c8f54222;border-radius:24px;padding:2.5rem 2rem;margin-bottom:1.25rem;text-align:center;position:relative;overflow:hidden}
.nph::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:var(--lime);opacity:0.05;border-radius:50%}
.nph-title{font-family:var(--font-head);font-size:1.6rem;font-weight:800;margin-bottom:0.6rem}
.nph-sub{color:var(--muted);font-size:0.88rem;line-height:1.7;max-width:400px;margin:0 auto}
.step{background:var(--gray);border:1.5px solid #ffffff0a;border-radius:16px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:0.6rem;transition:border-color 0.2s}
.step:hover{border-color:#ffffff18}
.step.sdone{border-color:#4ade8028;background:#060f06}
.snum{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:1.1rem;flex-shrink:0}
.snum.slime{background:var(--lime);color:#000}
.snum.sdim{background:#ffffff0f;color:var(--muted)}
.snum.sok{background:#4ade8018;color:#4ade80;font-size:1.3rem}
.stitle{font-family:var(--font-head);font-size:0.95rem;font-weight:700;margin-bottom:0.2rem}
.ssub{font-size:0.8rem;color:var(--muted);line-height:1.55}
.cta-big{width:100%;background:linear-gradient(135deg,var(--lime),var(--lime2));color:#000;border:none;border-radius:16px;padding:1.15rem;font-family:var(--font-head);font-weight:800;font-size:1rem;cursor:pointer;margin:1rem 0 0.75rem;box-shadow:0 4px 24px #c8f54220;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.25s}
.cta-big:hover{transform:translateY(-2px);box-shadow:0 8px 32px #c8f54230}
.sub-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.25rem}
.sub-a{background:#ffffff08;color:var(--white);border:1px solid #ffffff10;border-radius:12px;padding:0.85rem;font-family:var(--font-head);font-weight:700;font-size:0.85rem;text-decoration:none;text-align:center;display:block;transition:all 0.2s}
.sub-a:hover{background:#ffffff12;border-color:#ffffff20}
.pills{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap}
.pill{background:var(--gray);border:1px solid #ffffff0e;border-radius:100px;padding:0.45rem 1rem;font-size:0.75rem;color:var(--muted);display:flex;align-items:center;gap:0.35rem}
.pill b{color:var(--white)}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.page-title{font-family:var(--font-head);font-size:1.8rem;font-weight:800}
.page-title b{color:var(--lime)}
.page-sub{color:var(--muted);font-size:0.88rem;margin-top:0.35rem}
/* TOUR */
.tour-ov{position:fixed;inset:0;background:#000000aa;z-index:500;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.tour-box{background:#161616;border:1px solid #ffffff18;border-radius:24px;padding:2rem;max-width:420px;width:90%;animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.tour-badge{display:inline-flex;background:#c8f54215;border:1px solid #c8f54222;color:var(--lime);font-family:var(--font-head);font-weight:700;font-size:0.68rem;padding:0.25rem 0.75rem;border-radius:100px;margin-bottom:0.75rem}
.tour-icon{font-size:2.5rem;margin-bottom:0.75rem}
.tour-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;margin-bottom:0.5rem}
.tour-desc{font-size:0.87rem;color:#ffffffcc;line-height:1.7;margin-bottom:1.5rem}
.tour-dots{display:flex;gap:0.4rem;justify-content:center;margin-bottom:1.2rem}
.tdot{width:8px;height:8px;border-radius:50%;background:#ffffff15;transition:all 0.3s}
.tdot.on{background:var(--lime);width:20px;border-radius:100px}
.tour-btns{display:flex;gap:0.6rem}
.t-skip{background:transparent;color:var(--muted);border:1px solid #ffffff15;border-radius:100px;padding:0.6rem 1.1rem;font-family:var(--font-head);font-weight:700;font-size:0.82rem;cursor:pointer}
.t-next{flex:1;background:var(--lime);color:#000;border:none;border-radius:100px;padding:0.6rem;font-family:var(--font-head);font-weight:700;font-size:0.88rem;cursor:pointer}
.t-next:hover{background:var(--lime2)}
/* MOBiL */
.mob-btn{display:none}
.overlay{display:none;position:fixed;inset:0;background:#00000080;z-index:99}
.overlay.open{display:block}
@media(max-width:768px){
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;width:240px;transition:left 0.3s;z-index:100}
  .sidebar.open{left:0}
  .main{margin-left:0;padding:1rem}
  .mob-btn{display:flex;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--lime);color:var(--black);border:none;border-radius:10px;width:40px;height:40px;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer}
  .home-topbar,.topbar{margin-top:3.5rem}
  .two-col{grid-template-columns:1fr}
  .hero-focus{font-size:1.4rem}
  .ai-coach-full{height:calc(100vh - 140px)}
  .sub-row{grid-template-columns:1fr}
  .hero-btns,.upgrade-strip{flex-direction:column}
  .btn-go,.btn-out{width:100%;justify-content:center}
}
</style>
</head>
<body>

<div class="tour-ov" id="tourOverlay" style="display:none">
  <div class="tour-box">
    <div class="tour-badge" id="tourBadge">1 / 5</div>
    <div class="tour-icon" id="tourIcon"></div>
    <div class="tour-title" id="tourTitle"></div>
    <div class="tour-desc" id="tourDesc"></div>
    <div class="tour-dots" id="tourDots"></div>
    <div class="tour-btns">
      <button class="t-skip" onclick="closeTour()">Geç</button>
      <button class="t-next" id="tourNextBtn" onclick="nextTourStep()">Devam →</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="mob-btn" onclick="toggleSidebar()">&#9776;</button>

<div class="sidebar">
  <a class="logo" href="dashboard.html">Fit<span>Mind</span> AI</a>
  <nav class="nav">
    <button class="nav-item active" onclick="switchTab('home',this)"><span class="icon">&#127968;</span> Ana Sayfa</button>
    <button class="nav-item" onclick="switchTab('aicoach',this)"><span class="icon">&#129302;</span> AI Koç</button>
    <button class="nav-item" onclick="switchTab('workouts',this)"><span class="icon">&#127947;</span> Antrenmanlar</button>
    <a class="nav-item" href="myplan.html"><span class="icon">&#128203;</span> Benim Planım</a>
    <a class="nav-item" href="nutrition.html"><span class="icon">&#129367;</span> Beslenme</a>
    <a class="nav-item" href="progress.html"><span class="icon">&#128200;</span> &Iuml;lerleme</a>
    <a class="nav-item" href="community.html"><span class="icon">&#128101;</span> Topluluk</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="avatar" id="avatarInitial">?</div>
      <a class="user-name" id="userName" href="profile.html" style="text-decoration:none;color:inherit;cursor:pointer">Yükleniyor...</a>
      <button class="signout-btn" onclick="signOut()">&#9211;</button>
    </div>
  </div>
</div>

<div class="main">

<div class="tab-section active" id="tab-home">
  <div class="home-topbar">
    <div>
      <div class="home-greeting">Merhaba, <b id="heroName">...</b> &#128075;</div>
      <div class="home-date" id="heroDate"></div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
      <span id="planBadge" class="free-badge">&#220;CRETSIZ</span>
      <div class="badge-live"><span class="badge-dot"></span> AI Koç Aktif</div>
    </div>
  </div>
  <div id="homeContent">
    <div style="text-align:center;padding:4rem;color:var(--muted)">
      <div class="spin" style="margin:0 auto 1rem;display:block"></div>

async function callAI(messages,system,max_tokens){
  const body={messages,max_tokens:max_tokens||500};if(system)body.system=system;
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'API hatası');}
  const d=await res.json();return d.content?.[0]?.text||'';
}

}

}

    m.innerHTML+='<div class="msg limit">&#128274; <strong>Ücretsiz limit doldu</strong><br><button onclick="openCheckout()" style="margin-top:0.5rem;background:var(--lime);color:#000;border:none;padding:0.4rem 1.2rem;border-radius:100px;font-family:var(--font-head);font-weight:700;cursor:pointer">Pro\'ya Yükselt → $19/ay</button></div>';

      if(s!==-1&&e!==-1)clean=clean.slice(s,e+1);clean=clean.replace(/```json|```/g,'').trim();

      const up=JSON.parse(clean);
      const dm={'Sali':'Salı','Carsamba':'Çarşamba','Persembe':'Perşembe'};
      if(up.days)up.days=up.days.map(d=>({...d,day:dm[d.day]||d.day}));
      _pendingPlan=up;const t=m.querySelector('.msg.typing');if(t)t.remove();

  }

        h+='<div onclick="event.stopPropagation();window.open(\'https://www.youtube.com/results?search_query='+ytq+'\',\'_blank\')" style="background:#ffffff08;border:1px solid #ffffff10;border-radius:9px;padding:0.38rem 0.65rem;font-size:0.7rem;color:var(--muted);cursor:pointer;flex-shrink:0;font-family:var(--font-head);font-weight:700">&#9658; Video</div></div>';
      });
      h+='</div><button onclick="toggleDayDone(\''+dp.day+'\')" style="width:100%;margin-top:1rem;padding:0.85rem;border:none;border-radius:14px;font-family:var(--font-head);font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;'+(isDone?'background:#4ade8015;color:#4ade80;border:1.5px solid #4ade8030':'background:linear-gradient(135deg,var(--lime),var(--lime2));color:#000')+'">'+(isDone?'&#9989; Tamamlandı — Geri Al':'&#127937; Antrenmanı Tamamla')+'</button></div>';
      detail.innerHTML=h;
    }
    renderStrip();
    const sel=days.find(d=>d.day===window._workoutSelectedDay)||days.find(d=>d.day===TODAY_NAME)||days[0];
    if(sel)renderDay(sel);
  }catch(e){if(detail)detail.innerHTML='<div style="color:var(--muted);text-align:center;padding:2rem">Plan yüklenemedi.</div>';}
}

function toggleEx(el,idx,day,total){
  const s=JSON.parse(localStorage.getItem('fp_ex')||'{}'),k=day+'_ex';
  if(!s[k])s[k]=[];const a=s[k],p=a.indexOf(idx);
  if(p>-1)a.splice(p,1);else a.push(idx);localStorage.setItem('fp_ex',JSON.stringify(s));
  if(a.length>=total){const d=JSON.parse(localStorage.getItem('fp_done')||'{}');d[day]=true;localStorage.setItem('fp_done',JSON.stringify(d));}
  loadWorkoutsTab();
}
function toggleDayDone(day){
  const d=JSON.parse(localStorage.getItem('fp_done')||'{}');
  if(d[day])delete d[day];else d[day]=true;
  localStorage.setItem('fp_done',JSON.stringify(d));loadWorkoutsTab();
}
async function signOut(){await sb.auth.signOut();window.location.replace('auth.html');}

const TOUR=[
  {i:'&#128075;',t:'FitMind AI'ya Hoş Geldin!',d:'AI destekli kişisel fitness koçun burada. Planını oluştur, antrenmanlarını takip et, beslenmeni düzenle.'},
  {i:'&#129302;',t:'Önce Plan Yaptır',d:'Sol menüden <strong>AI Koç</strong> sekmesine git. <strong style="color:var(--lime)">"Plan yap"</strong> yaz. 10 saniyede kişisel 7 günlük planın hazır!'},
  {i:'&#127968;',t:'Ana Sayfa = Günlük Rehberin',d:'Her gün ne yapacağını gör. Antrenmanın, beslenmen, su takibin — net, sade.'},
  {i:'&#127947;',t:'Antrenmanları Takip Et',d:'<strong>Antrenmanlar</strong> sekmesinde egzersizleri işaretle. Her egzersiz için video linki var.'},
  {i:'&#128640;',t:'Hazır mısın?',d:'<strong>AI Koç</strong> sekmesine git ve <strong style="color:var(--lime)">"plan yap"</strong> yaz. 10 saniyede planın hazır!'},
];
let tStep=0;
function startTour(){tStep=0;renderTour();document.getElementById('tourOverlay').style.display='flex';}
function renderTour(){
  const s=TOUR[tStep];
  document.getElementById('tourBadge').textContent=(tStep+1)+' / '+TOUR.length;
  document.getElementById('tourIcon').innerHTML=s.i;
  document.getElementById('tourTitle').textContent=s.t;
  document.getElementById('tourDesc').innerHTML=s.d;
  const dots=document.getElementById('tourDots');dots.innerHTML='';
  TOUR.forEach((_,i)=>{const d=document.createElement('div');d.className='tdot'+(i===tStep?' on':'');dots.appendChild(d);});
  document.getElementById('tourNextBtn').innerHTML=tStep===TOUR.length-1?'Hadi Başlayalım! &#128640;':'Devam →';
}
function nextTourStep(){if(tStep<TOUR.length-1){tStep++;renderTour();}else{closeTour();switchTab('aicoach',document.querySelectorAll('.nav-item')[1]);}}
function closeTour(){document.getElementById('tourOverlay').style.display='none';localStorage.setItem('fm_tourDone','1');}

init();
</script>
