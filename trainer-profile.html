<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMind AI – Trainer Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#f5f2eb;--lime:#c8f542;--blue:#44aaff;--muted:#888;--font-head:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh}
.nav{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #ffffff0a;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--font-head);font-weight:800;font-size:1.15rem;color:var(--white);text-decoration:none}
.logo span{color:var(--lime)}
.back-link{color:var(--muted);text-decoration:none;font-size:0.9rem;display:inline-flex;align-items:center;gap:0.4rem;transition:color 0.2s}
.back-link:hover{color:var(--white)}

.container{max-width:960px;margin:0 auto;padding:2.5rem 2rem}
.grid{display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start}

/* HEADER */
.header{background:#111;border:1px solid #ffffff0f;border-radius:24px;padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:var(--lime);opacity:0.04;border-radius:50%;pointer-events:none}
.header-row{display:flex;gap:1.75rem;align-items:flex-start;flex-wrap:wrap}
.avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:2.5rem;color:var(--black);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1;min-width:200px}
.name{font-family:var(--font-head);font-size:1.9rem;font-weight:800;margin-bottom:0.4rem;line-height:1.15}
.type-row{display:flex;align-items:center;gap:0.5rem;color:var(--muted);font-size:0.92rem;margin-bottom:0.75rem}
.type-dot{width:6px;height:6px;border-radius:50%;background:var(--lime)}
.meta-row{display:flex;flex-wrap:wrap;gap:1rem;font-size:0.85rem;color:#ffffffbb;margin-top:0.5rem}
.meta-item{display:inline-flex;align-items:center;gap:0.35rem}

/* SECTION */
.section{background:#111;border:1px solid #ffffff0f;border-radius:20px;padding:1.75rem;margin-bottom:1.25rem}
.section-title{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.section-icon{font-size:1.1rem}
.bio-text{color:#ffffffcc;font-size:0.95rem;line-height:1.7;white-space:pre-wrap}
.chip-wrap{display:flex;flex-wrap:wrap;gap:0.5rem}
.chip{background:#ffffff08;border:1px solid #ffffff10;border-radius:100px;padding:0.45rem 1rem;font-size:0.82rem;color:#ffffffcc;font-family:var(--font-head);font-weight:600}
.chip.lime{background:#c8f54210;border-color:#c8f54230;color:var(--lime)}

/* SIDE CARD */
.side-card{background:#111;border:1px solid #ffffff0f;border-radius:20px;padding:1.75rem;position:sticky;top:90px}
.price{text-align:center;padding-bottom:1.25rem;border-bottom:1px solid #ffffff0a;margin-bottom:1.25rem}
.price-num{font-family:var(--font-head);font-size:2.2rem;font-weight:800;color:var(--lime)}
.price-unit{font-size:0.88rem;color:var(--muted);margin-top:0.15rem}
.price-note{font-size:0.78rem;color:#ffffff50;margin-top:0.5rem}
.cta-btn{width:100%;border:none;border-radius:100px;padding:0.9rem;font-family:var(--font-head);font-weight:700;font-size:0.92rem;cursor:pointer;transition:all 0.25s;margin-bottom:0.6rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;text-decoration:none}
.cta-primary{background:var(--lime);color:#000}
.cta-primary:hover{background:#a8d92e;transform:translateY(-1px)}
.cta-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.cta-whatsapp{background:#25D366;color:#fff}
.cta-whatsapp:hover{background:#1ea752}
.cta-secondary{background:transparent;color:var(--muted);border:1.5px solid #ffffff15}
.cta-secondary:hover{border-color:#ffffff30;color:var(--white)}
.trust-row{display:flex;gap:0.75rem;padding-top:1.25rem;margin-top:1.25rem;border-top:1px solid #ffffff0a;justify-content:space-around;flex-wrap:wrap}
.trust-item{text-align:center}
.trust-val{font-family:var(--font-head);font-weight:800;font-size:1.1rem}
.trust-label{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--font-head);font-weight:600}

/* MESSAGE MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal.open{display:flex}
.modal-card{background:#111;border:1px solid #ffffff15;border-radius:20px;padding:2rem;max-width:480px;width:100%;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all 0.2s}
.modal-close:hover{background:#ffffff08;color:var(--white)}
.modal-title{font-family:var(--font-head);font-size:1.2rem;font-weight:700;margin-bottom:0.4rem}
.modal-sub{color:var(--muted);font-size:0.88rem;margin-bottom:1.25rem}
.modal-input{width:100%;background:#ffffff08;border:1.5px solid #ffffff12;border-radius:12px;padding:0.85rem 1rem;color:var(--white);font-family:var(--font-body);font-size:0.95rem;outline:none;margin-bottom:0.75rem;resize:vertical;min-height:120px}
.modal-input:focus{border-color:#c8f54250}
.msg{padding:0.85rem 1rem;border-radius:12px;font-size:0.88rem;margin-top:0.75rem;display:none}
.msg.success{background:#4ade8015;border:1px solid #4ade8030;color:#4ade80;display:block}
.msg.error{background:#ff6b6b15;border:1px solid #ff6b6b30;color:#ff6b6b;display:block}

/* LOADING */
.loader{display:flex;justify-content:center;padding:4rem}
.spin{width:32px;height:32px;border:3px solid #ffffff15;border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:820px){
  .grid{grid-template-columns:1fr}
  .side-card{position:static}
  .header{padding:1.75rem}
  .name{font-size:1.5rem}
  .avatar{width:88px;height:88px;font-size:2rem}
  .container{padding:1.5rem 1rem}
  .nav{padding:0.85rem 1rem}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo">Fit<span>Mind</span> AI</a>
  <a href="trainers.html" class="back-link">← Back to trainers</a>
</nav>

<div class="container" id="container">
  <div class="loader"><div class="spin"></div></div>
</div>

<!-- MESSAGE MODAL -->
<div class="modal" id="msgModal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Send a message</div>
    <div class="modal-sub" id="modalSub">Introduce yourself and share your goals.</div>
    <textarea class="modal-input" id="msgText" placeholder="Hi! I'm looking to lose weight and build strength. I work full-time but can train 3 evenings a week. Are you available?"></textarea>
    <button class="cta-btn cta-primary" onclick="sendMsg()" id="sendBtn">Send Message →</button>
    <div class="msg" id="msgStatus"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cypmmayxwbkarvheqoxu.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cG1tYXl4d2JrYXJ2aGVxb3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjU4ODgsImV4cCI6MjA5MTQwMTg4OH0.DYglvHEwlOCM3qfNSAG2PQMs76533XULIFNm5k8lYKk';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

let trainer=null;
let currentUser=null;

function typeLabel(t){
  if(t==='trainer')return 'Personal Trainer';
  if(t==='physio')return 'Physiotherapist';
  if(t==='both')return 'Trainer & Physiotherapist';
  return 'Trainer';
}

function workLabel(w){
  if(w==='online')return '🌐 Online sessions';
  if(w==='in_person')return '📍 In-person only';
  if(w==='both')return '⚡ Online & In-person';
  return '';
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  if(!id){
    document.getElementById('container').innerHTML='<div class="loader">No trainer specified.</div>';
    return;
  }

  const {data:{session}}=await sb.auth.getSession();
  currentUser=session?.user||null;

  const {data,error}=await sb.from('profiles').select('*').eq('id',id).maybeSingle();
  if(error||!data){
    document.getElementById('container').innerHTML='<div class="loader">Trainer not found.</div>';
    return;
  }
  trainer=data;
  render();
}

function render(){
  const initial=(trainer.full_name||'T').charAt(0).toUpperCase();
  const avatar=trainer.avatar_url?`<img src="${trainer.avatar_url}">`:initial;
  const location=[trainer.city,trainer.country].filter(Boolean).join(', ');
  const priceHtml=trainer.price_hour?`<div class="price-num">$${trainer.price_hour}</div><div class="price-unit">per hour</div>`:`<div class="price-num" style="font-size:1.3rem">Contact for pricing</div>`;

  const whatsappBtn=trainer.whatsapp?`<a href="https://wa.me/${trainer.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" class="cta-btn cta-whatsapp">💬 Chat on WhatsApp</a>`:'';

  document.getElementById('container').innerHTML=`
    <div class="grid">
      <div>
        <!-- HEADER -->
        <div class="header">
          <div class="header-row">
            <div class="avatar">${avatar}</div>
            <div class="header-info">
              <div class="name">${trainer.full_name||'Trainer'}</div>
              <div class="type-row"><span class="type-dot"></span>${typeLabel(trainer.trainer_type)}</div>
              <div class="meta-row">
                ${trainer.experience_years?`<span class="meta-item">💪 ${trainer.experience_years} years of experience</span>`:''}
                ${location?`<span class="meta-item">📍 ${location}</span>`:''}
                ${trainer.work_type?`<span class="meta-item">${workLabel(trainer.work_type)}</span>`:''}
              </div>
            </div>
          </div>
        </div>

        <!-- ABOUT -->
        ${trainer.bio?`
        <div class="section">
          <div class="section-title"><span class="section-icon">👋</span>About</div>
          <div class="bio-text">${trainer.bio}</div>
        </div>`:''}

        <!-- SPECIALTIES -->
        ${trainer.specialties&&trainer.specialties.length?`
        <div class="section">
          <div class="section-title"><span class="section-icon">🎯</span>Expertise</div>
          <div class="chip-wrap">
            ${trainer.specialties.map(s=>`<span class="chip lime">${s}</span>`).join('')}
          </div>
        </div>`:''}

        <!-- LANGUAGES -->
        ${trainer.languages&&trainer.languages.length?`
        <div class="section">
          <div class="section-title"><span class="section-icon">🌍</span>Languages</div>
          <div class="chip-wrap">
            ${trainer.languages.map(l=>`<span class="chip">${l}</span>`).join('')}
          </div>
        </div>`:''}
      </div>

      <!-- SIDEBAR -->
      <div class="side-card">
        <div class="price">
          ${priceHtml}
          <div class="price-note">Prices may vary by session type</div>
        </div>
        <button class="cta-btn cta-primary" onclick="openModal()">Send a Message</button>
        ${whatsappBtn}
        <div class="trust-row">
          <div class="trust-item">
            <div class="trust-val">${trainer.experience_years||'—'}</div>
            <div class="trust-label">Yrs exp</div>
          </div>
          <div class="trust-item">
            <div class="trust-val">${trainer.rating||'New'}</div>
            <div class="trust-label">Rating</div>
          </div>
          <div class="trust-item">
            <div class="trust-val">${trainer.review_count||0}</div>
            <div class="trust-label">Reviews</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function openModal(){
  if(!currentUser){
    window.location.href='auth.html';
    return;
  }
  document.getElementById('modalSub').textContent=`Message to ${trainer.full_name||'this trainer'}.`;
  document.getElementById('msgModal').classList.add('open');
}

function closeModal(){
  document.getElementById('msgModal').classList.remove('open');
  document.getElementById('msgText').value='';
  document.getElementById('msgStatus').className='msg';
}

async function sendMsg(){
  const text=document.getElementById('msgText').value.trim();
  const status=document.getElementById('msgStatus');
  if(!text){status.textContent='Please enter a message.';status.className='msg error';return;}

  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='Sending...';

  const {error}=await sb.from('patient_messages').insert({
    patient_id:currentUser.id,
    physio_id:trainer.id,
    sender_role:'patient',
    source:'marketplace',
    message:text,
    created_at:new Date().toISOString()
  });

  btn.disabled=false;btn.textContent='Send Message →';
  if(error){status.textContent='Failed to send: '+error.message;status.className='msg error';}
  else{
    status.textContent='✓ Message sent! The trainer will reply soon.';
    status.className='msg success';
    document.getElementById('msgText').value='';
    setTimeout(closeModal,2500);
  }
}

init();
</script>
</body>
</html>
