<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMind AI – Benim Planım</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Değişkenleri ve Font Ayarları */
        :root {
            --black: #0a0a0a;
            --white: #f5f2eb;
            --lime: #c8f542;
            --lime2: #a8d92e;
            --gray: #111;
            --muted: #888;
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--black); 
            color: var(--white); 
            font-family: var(--font-body); 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Başlık Font Düzeltmesi */
        .page-title {
            font-family: var(--font-head);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        /* Kenar Çubuğu ve Diğerleri (Mevcut stillerini korudum) */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #0d0d0d; border-right: 1px solid #ffffff0f; padding: 1.5rem; display: flex; flex-direction: column; z-index: 10; }
        .logo { font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #ffffff0f; text-decoration: none; color: inherit; display: block; }
        .logo span { color: var(--lime); }
        .main { margin-left: 240px; padding: 2rem; min-height: 100vh; }
        
        .panel { background: var(--gray); border: 1px solid #ffffff0f; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .spin { display: inline-block; width: 30px; height: 30px; border: 3px solid #ffffff15; border-top-color: var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Takvim ve Antrenman Stilleri (Mevcut olanların devamı...) */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.6rem; margin-bottom: 2rem; }
        .day-pill { border-radius: 18px; padding: 1.1rem 0.4rem; text-align: center; cursor: pointer; transition: all 0.25s; border: 2px solid #ffffff0a; background: #0d0d0d; }
        .day-pill.state-selected { border-color: var(--lime); background: #1a1a1a; transform: translateY(-4px); }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1rem; border-radius: 12px; transition: all 0.2s; font-size: 0.9rem; color: var(--muted); text-decoration: none; }
        .nav-item.active { background: #c8f54215; color: var(--lime); }
        .btn { background: var(--lime); color: #000; border: none; border-radius: 100px; padding: 0.65rem 1.4rem; font-family: var(--font-head); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a class="logo" href="dashboard.html">Fit<span>Mind</span> AI</a>
        <nav class="nav">
            <a class="nav-item" href="dashboard.html">🏠 Ana Sayfa</a>
            <a class="nav-item active" href="myplan.html">📋 Benim Planım</a>
            <a class="nav-item" href="nutrition.html">🥗 Beslenme</a>
        </nav>
    </div>

    <div class="main">
        <div class="topbar">
            <h1 class="page-title">Benim Planım</h1>
            <p id="planDate" style="color: var(--muted);"></p>
        </div>

        <div id="stateLoading" style="text-align:center; padding: 5rem;">
            <div class="spin"></div>
            <p style="margin-top: 1rem; color: var(--muted);">Planınız hazırlanıyor...</p>
        </div>

        <div id="stateEmpty" style="display:none; text-align: center; padding: 5rem;">
            <h2>Henüz bir planın yok.</h2>
            <button class="btn" onclick="window.location.href='dashboard.html'" style="margin-top: 1rem;">AI Koç ile Plan Oluştur</button>
        </div>

        <div id="statePlan" style="display:none;">
            <div class="panel">
                <div class="week-grid" id="weekGrid"></div>
            </div>
            <div id="workoutBody" class="panel">
                </div>
        </div>
    </div>

    <script>
        // Supabase Bağlantısı
        const SUPABASE_URL = 'https://cypmmayxwbkarvheqoxu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cG1tYXl4d2JrYXJ2aGVxb3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjU4ODgsImV4cCI6MjA5MTQwMTg4OH0.DYglvHEwlOCM3qfNSAG2PQMs76533XULIFNm5k8lYKk';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (!session) {
                    window.location.replace('auth.html');
                    return;
                }

                // Planı Getir
                const { data, error } = await sb
                    .from('user_plans')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    document.getElementById('stateLoading').style.display = 'none';
                    document.getElementById('stateEmpty').style.display = 'block';
                } else {
                    document.getElementById('stateLoading').style.display = 'none';
                    document.getElementById('statePlan').style.display = 'block';
                    renderPlan(data.plan_data);
                }
            } catch (err) {
                console.error("Hata:", err);
                alert("Plan yüklenirken bir sorun oluştu.");
            }
        }

        function renderPlan(plan) {
            const grid = document.getElementById('weekGrid');
            const days = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];
            
            grid.innerHTML = days.map(day => `
                <div class="day-pill ${new Date().toLocaleDateString('tr-TR', {weekday: 'long'}) === day ? 'state-selected' : ''}">
                    <div style="font-size: 0.7rem; font-weight: 800;">${day.substring(0,3).toUpperCase()}</div>
                    <div style="font-size: 1.2rem; margin: 5px 0;">⚡</div>
                </div>
            `).join('');

            // Antrenman içeriği (Örnek)
            document.getElementById('workoutBody').innerHTML = `
                <h3 style="font-family: var(--font-head); margin-bottom: 1rem;">Bugünkü Antrenman</h3>
                <p style="color: var(--muted);">${plan.nutrition || 'Plan detayları yüklenemedi.'}</p>
            `;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
