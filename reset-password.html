<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMind AI – Şifre Sıfırla</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#f5f2eb;--lime:#c8f542;--lime2:#a8d92e;--muted:#888;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#111;border:1px solid #ffffff15;border-radius:24px;padding:3rem;width:100%;max-width:420px}
.logo{font-family:var(--font-head);font-weight:800;font-size:1.4rem;text-align:center;margin-bottom:2rem}
.logo span{color:var(--lime)}
h2{font-family:var(--font-head);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;text-align:center}
p{color:var(--muted);font-size:0.85rem;text-align:center;margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:0.8rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.5rem;font-weight:700}
input{width:100%;background:#ffffff08;border:1px solid #ffffff15;border-radius:12px;padding:0.85rem 1rem;color:var(--white);font-family:var(--font-body);font-size:1rem;outline:none;transition:border-color 0.2s}
input:focus{border-color:#c8f54250}
.btn{width:100%;background:var(--lime);color:#000;border:none;border-radius:100px;padding:0.9rem;font-family:var(--font-head);font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.25s;margin-top:0.5rem}
.btn:hover{background:var(--lime2)}
.msg{padding:0.8rem 1rem;border-radius:12px;font-size:0.9rem;margin-top:1rem;display:none}
.msg.error{background:#ff444415;border:1px solid #ff444430;color:#ff8888;display:block}
.msg.success{background:#c8f54215;border:1px solid #c8f54230;color:var(--lime);display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Fit<span>Mind</span> AI</div>
  <h2>Yeni Şifre Belirle</h2>
  <p>Lütfen yeni şifrenizi girin.</p>
  <div class="form-group">
    <label>Yeni Şifre / New Password</label>
    <input type="password" id="newPassword" placeholder="En az 8 karakter">
  </div>
  <div class="form-group">
    <label>Şifre Tekrar / Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Şifreyi tekrar girin">
  </div>
  <button class="btn" onclick="updatePassword()">Şifreyi Güncelle →</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const sb=supabase.createClient('https://cypmmayxwbkarvheqoxu.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cG1tYXl4d2JrYXJ2aGVxb3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjU4ODgsImV4cCI6MjA5MTQwMTg4OH0.DYglvHEwlOCM3qfNSAG2PQMs76533XULIFNm5k8lYKk');
async function updatePassword(){
  const np=document.getElementById('newPassword').value;
  const cp=document.getElementById('confirmPassword').value;
  const msg=document.getElementById('msg');
  if(!np||!cp){msg.textContent='Lütfen tüm alanları doldurun.';msg.className='msg error';return;}
  if(np.length<8){msg.textContent='Şifre en az 8 karakter olmalıdır.';msg.className='msg error';return;}
  if(np!==cp){msg.textContent='Şifreler eşleşmiyor.';msg.className='msg error';return;}
  const {error}=await sb.auth.updateUser({password:np});
  if(error){msg.textContent='Hata: '+error.message;msg.className='msg error';}
  else{
    msg.textContent='✓ Şifreniz güncellendi! Yönlendiriliyorsunuz...';
    msg.className='msg success';
    setTimeout(()=>window.location.replace('auth.html'),2000);
  }
}
</script>
</body>
</html>
